<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circular border -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#00d4e8" stroke-width="3"/>
  
  <!-- Main circular background -->
  <circle cx="100" cy="100" r="95" fill="#0f2a32"/>
  
  <!-- LS Logo Design (centered, clear) -->
  <g transform="translate(100, 100)">
    <!-- L: Left vertical line -->
    <rect x="-32" y="-38" width="14" height="76" fill="#00d4e8" rx="4"/>
    
    <!-- L: Bottom horizontal line -->
    <rect x="-32" y="32" width="64" height="14" fill="#00d4e8" rx="4"/>
    
    <!-- S: Upper curve (top bump) -->
    <path d="M 22 -28 Q 45 -28 45 -12 Q 45 2 18 6" 
          stroke="#00d4e8" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- S: Lower curve (bottom bump) -->
    <path d="M 18 6 Q -8 10 -8 26 Q -8 42 18 42 Q 45 42 48 28" 
          stroke="#00d4e8" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
